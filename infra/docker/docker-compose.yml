services:
  backend:
    image: 313694530717.dkr.ecr.eu-west-2.amazonaws.com/obucon:${IMAGE_TAG:-latest}
    container_name: obucon-backend
    env_file:
      - .env.prod
    environment:
      - APP_SECRET_NAME=obucon/prod/app
    ports:
      - "8080:8080"
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    container_name: obucon-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/ec2-user/.docker/config.json:/config.json:ro
      - /usr/bin/docker-credential-ecr-login:/usr/bin/docker-credential-ecr-login:ro
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - AWS_REGION=eu-west-2
      - PATH=/usr/bin
    command: obucon-backend
