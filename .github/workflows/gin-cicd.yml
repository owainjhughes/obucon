name: Gin CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "infra/docker/**"
      - ".github/workflows/gin-cicd.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to EC2 after push"
        required: true
        default: true
        type: boolean

env:
  AWS_REGION: eu-west-2
  ECR_REGISTRY: 313694530717.dkr.ecr.eu-west-2.amazonaws.com
  ECR_REPOSITORY: obucon

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build validation
        working-directory: backend
        run: go build ./...

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::12}" >> $GITHUB_ENV
          echo "image_tag=${GITHUB_SHA::12}" >> $GITHUB_OUTPUT

      - name: Build image
        run: |
          docker build \
            -f infra/docker/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            .

      - name: Push image
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG