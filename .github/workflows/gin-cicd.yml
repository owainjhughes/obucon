name: Gin CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/gin-cicd.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to EC2 after push"
        required: true
        default: true
        type: boolean

env:
  AWS_REGION: eu-west-2
  ECR_REGISTRY: 313694530717.dkr.ecr.eu-west-2.amazonaws.com
  ECR_REPOSITORY: obucon

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build validation
        working-directory: backend
        run: go build ./...

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::12}" >> $GITHUB_ENV
          echo "image_tag=${GITHUB_SHA::12}" >> $GITHUB_OUTPUT

      - name: Build image
        run: |
          docker build \
            -f Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            .

      - name: Push image
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload EC2 compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.EC2_USER }}/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,ECR_REGISTRY,ECR_REPOSITORY,IMAGE_TAG
          script: |
            set -e
            if [ ! -f ~/.env.prod ]; then
              echo "~/.env.prod not found on EC2. Create it before running deploy." >&2
              exit 1
            fi

            cat > ~/.deploy.env <<EOF
            IMAGE_TAG=${IMAGE_TAG}
            EOF

            aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
            docker compose --env-file ~/.deploy.env -f ~/docker-compose.yml pull
            docker compose --env-file ~/.deploy.env -f ~/docker-compose.yml up -d --force-recreate
            docker image prune -f
